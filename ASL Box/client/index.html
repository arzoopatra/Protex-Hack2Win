<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ASL Box</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Unica+One&family=Molengo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* ===== GLOBAL ===== */
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: sans-serif;
    }

    /* ===== BOX CONTAINER ===== */
    .box {
      position: relative;
      margin-top: 120px;
    }

    /* ===== BOX BODY ===== */
    .box-body {
      position: relative;
      height: 200px;
      width: 200px;
      margin: auto;
      background: linear-gradient(#762c2c, #ff7b00);
      border-bottom-left-radius: 8%;
      border-bottom-right-radius: 8%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .box-body:hover {
      transform: scale(1.05);
    }

    /* 🎬 OPEN ANIMATION */
    .box-body.active {
      animation: box-body 1s forwards ease-in-out;
    }

    /* 🎀 RIBBON STRIP */
    .box-body::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      top: 0;
      bottom: 0;

      background:
        radial-gradient(circle, #003eb3 3px, transparent 4px),
        linear-gradient(#ffffff, #ffefa0);

      background-size: 20px 20px, 100% 100%;
      background-position: center;
    }

    /* ===== BOX LID ===== */
    .box-lid {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 90%;
      height: 40px;
      width: 220px;
      background: #cc231e;
      border-radius: 6px;
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.5);
    }

    /* 🔥 TRIGGER LID ANIMATION ON CLICK */
    .box-body.active .box-lid {
      animation: box-lid 1s forwards ease-in-out;
    }

    /* ribbon on lid */
    .box-lid::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      top: 0;
      bottom: 0;

      background:
        radial-gradient(circle, #003eb3 3px, transparent 4px),
        linear-gradient(#ffefa0, #fff);

      background-size: 20px 20px, 100% 100%;
      background-position: center;
    }

    /* ===== BOW ===== */
    .box-bowtie::before,
    .box-bowtie::after {
      content: "";
      width: 80px;
      height: 80px;
      border: 14px solid #003eb3;
      border-radius: 50% 50% 0 50%;
      position: absolute;
      bottom: 99%;
    }

    .box-bowtie::before {
      left: 50%;
      transform: translateX(-100%) skew(10deg, 10deg);
    }

    .box-bowtie::after {
      left: 50%;
      transform: translateX(0%) rotate(90deg) skew(10deg, 10deg);
    }

    /* ===== CARD ===== */
    .card {
      width: 260px;
      margin: 20px auto;
      background: #ffffff;
      color: #003eb3;
      padding: 20px;
      border: 8px solid #003eb3;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.4s;
      position: relative;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      line-height: 1.4;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card h3 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

      font-family: 'Unica One', cursive;
      font-size: 26px;
      /* 🔥 increased (was ~22-24) */
      letter-spacing: 1.5px;
      color: #003eb3;

      margin-bottom: 14px;
      /* 🔥 adds gap below heading */
      text-transform: uppercase;

    }

    #icon {
      font-size: 18px;
    }

    #tip {
      font-family: 'Molengo', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      margin-top: 25px;
      /* 🔥 extra spacing from heading */
      color: #333;
    }

    /* ❌ CLOSE BUTTON */
    .close-btn {
      top: 8px;
      right: 10px;
      cursor: pointer;
      color: #666;
    }

    .close-btn:hover {
      color: black;
    }

    #aslImage {
      border-radius: 12px;
      margin-top: 12px;
      max-width: 140px;
    }

    .loader {
      width: 28px;
      height: 28px;
      border: 4px solid #ddd;
      border-top: 4px solid #003eb3;
      border-radius: 50%;
      margin: 10px auto;
      animation: spin 1s linear infinite;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    #icon {
      font-size: 18px;
      color: #003eb3;
    }

    #titleText {
      flex: 1;
      text-align: center;
      font-family: 'Unica One', cursive;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    /* ===== ANIMATIONS ===== */
    @keyframes box-lid {

      0%,
      42% {
        transform: translate(-50%, 0, 0) rotate(0);
      }

      60% {
        transform: translate(-85%, -230%) rotate(-25deg);
      }

      100% {
        transform: translate(-119%, 225%) rotate(-70deg);
      }
    }

    @keyframes box-body {
      0% {
        transform: translateY(0) rotate(0);
      }

      25% {
        transform: translateY(25%) rotate(20deg);
      }

      50% {
        transform: translateY(-15%);
      }
    }
  </style>
</head>

<body>

  <div class="box" onclick="openBox()">
    <div id="boxBody" class="box-body">
      <div class="box-lid">
        <div class="box-bowtie"></div>
      </div>
    </div>
  </div>

  <div id="card" class="card">

    <div class="card-header">
      <i id="icon" class="fa-solid fa-lightbulb"></i>
      <span id="titleText">ASL Daily</span>
      <span class="close-btn" onclick="closeCard()">✖</span>
    </div>
    <p id="tip">Loading...</p>
    <img id="aslImage" style="width:120px; margin-top:10px; display:none;">
  </div>


  <script>
    /* ===== IMAGE DATA ===== */
    const aslImages = {
      "hello": "image/hello.png",
      "thank you": "image/thankyou.png",
      "thanks": "image/thank.png",
      "yes": "image/yes.png",
      "no": "image/no.png",
      "please": "image/please.png"
    };

    /* ===== STATE ===== */
    let isOpen = false;

    /* ===== DAILY CONTENT ===== */
    async function getDailyContent() {
      const today = new Date().toDateString();

      let saved = localStorage.getItem("asl-daily");
      let confettiShown = localStorage.getItem("asl-confetti");

      if (!saved || JSON.parse(saved).date !== today) {
        const res = await fetch("http://localhost:3000/api/asl-tip");
        const data = await res.json();

        const type = Math.random() > 0.5 ? "tip" : "sign";

        const content = {
          date: today,
          tip: data.tip,
          type: type
        };

        localStorage.setItem("asl-daily", JSON.stringify(content));
        localStorage.removeItem("asl-confetti"); // 🔥 reset confetti for new day

        return { ...content,
          isNew: true
        };
      }

      return { ...JSON.parse(saved),
        isNew: false
      };
    }

    async function openBox() {
      if (isOpen) return;
      isOpen = true;

      const box = document.getElementById("boxBody");
      const card = document.getElementById("card");
      const tipEl = document.getElementById("tip");
      const img = document.getElementById("aslImage");

      const icon = document.getElementById("icon"); // ✅ FIRST
      const titleText = document.getElementById("titleText"); // ✅ FIRST

      box.classList.add("active");

      setTimeout(async () => {
        card.classList.add("show");
        img.style.display = "none";

        // 🔄 LOADING STATE
        icon.className = "fa-solid fa-robot";
        titleText.innerText = "Thinking...";
        tipEl.innerHTML = "<div class='loader'></div>";

        const content = await getDailyContent(); // ✅ INSIDE

        // 🎉 CONFETTI
        if (content.isNew && !localStorage.getItem("asl-confetti")) {
          launchConfetti();
          localStorage.setItem("asl-confetti", "true");
        }

        // 🔥 FINAL TITLE + ICON
        if (content.type === "sign") {
          icon.className = "fa-solid fa-hand";
          titleText.innerText = "Sign of the Day";
        } else {
          icon.className = "fa-solid fa-lightbulb";
          titleText.innerText = "Tip of the Day";
        }

        // 🧠 TIP TEXT
        tipEl.innerText = content.tip;

        // 🖼️ IMAGE
        if (content.type === "sign") {
          for (let key in aslImages) {
            if (content.tip.toLowerCase().includes(key)) {
              img.src = aslImages[key];
              img.style.display = "block";
              break;
            }
          }
        }

      }, 600);
    }

    /* ===== CLOSE BOX ===== */
    function closeCard() {
      document.getElementById("card").classList.remove("show");
      document.getElementById("boxBody").classList.remove("active");
      isOpen = false;
    }

    function launchConfetti() {
      const duration = 1000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 6,
          spread: 70,
          origin: {
            x: 0.5,
            y: 0.65 // 🔥 lower position (near card)
          }
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }
  </script>

</body>

</html>
